spring.datasource.url=${DB_URL:jdbc:sqlserver://IP_SERVER:1433;databaseName=project_iku;encrypt=false;trustServerCertificate=true;sendStringParametersAsUnicode=true}
spring.datasource.username=${DB_USERNAME:prod_user}
spring.datasource.password=${DB_PASSWORD:prod_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.org.hibernate.SQL=error
logging.level.org.hibernate.type.descriptor.sql=error